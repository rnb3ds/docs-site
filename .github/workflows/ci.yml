name: CI

# Quality gate: type-check + production build on every PR and main push.
# Deploy (FTP) is handled separately by deploy.yml; this workflow only guards
# against regressions (type errors, broken builds, dead internal links —
# VitePress fails the build on the latter by default).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

        # Project metadata dual-source sync (projects.yaml ↔ shared.ts).
        # Catches "added to yaml, forgot shared.ts" drift before merge.
      - name: Project metadata sync
        run: npm run check:projects

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=7168

      # Locale parity gate: every non-primary language's page set must match zh.
      # Catches missing/extra pages across the 5 language trees before merge.
      # Local: `npm run audit` → report/locale-parity.md.
      - name: Locale parity audit
        run: npm run audit

  # CJK typography gate (half/full-width punctuation, CJK–Latin spacing).
  # Chinese is the primary language, so this is near-zero-cost polish.
  # Local: `npm run lint:autocorrect` / `npm run fix:autocorrect`.
  lint:
    name: Autocorrect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # reviewdog's `github-pr-review` reporter needs PR-write to post comments.
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # reviewdog needs full git history to compute PR diff context
          # (which files/lines changed relative to the base branch).
          fetch-depth: 0

      # PR: post CJK typography issues as inline review comments via reviewdog
      # (`github-pr-review` reporter), in addition to failing the job on
      # error-level issues. The comments make the gate self-explanatory —
      # contributors see exactly which line has the half-width/full-width
      # problem without reading the raw autocorrect log.
      - name: Autocorrect (PR review)
        if: github.event_name == 'pull_request'
        uses: huacnlee/autocorrect-action@main
        with:
          use_npm: true
          reviewdog: true
          reporter: github-pr-review
          # `file` = report issues on any file touched by the PR (not just
          # changed lines), since autocorrect lints whole files.
          filter_mode: file

      # Push to main: keep the simple fail-on-error gate. No inline comments
      # (no PR to comment on); main is protected so any new typo is caught
      # at the next PR anyway.
      - name: Autocorrect (push gate)
        if: github.event_name != 'pull_request'
        uses: huacnlee/autocorrect-action@main
        with:
          use_npm: true

  # API drift gate (specs/0002). audit-api.ts scans each library's Go source
  # (AST exports) and compares against the zh docs; DANGLING references — docs
  # citing symbols the source no longer exports — fail the job (exit 1).
  # Source is checked out from github.com/cybergodev/{project}: a missing or
  # private repo fails the checkout step red, rather than letting audit:api
  # silently skip it (scripts/audit-api.ts treats a missing source dir as skip).
  audit-api:
    name: API drift (audit:api)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      # Shared setup: 6 cybergodev source checkouts (src/{project}-dev) + Go +
      # Node + npm ci. See .github/actions/setup-cybergo-src/action.yml.
      - uses: ./.github/actions/setup-cybergo-src

      - name: API drift audit
        env:
          # audit-api.ts joins CYBERGO_SOURCE_ROOT + `{project}-dev`, matching
          # the src/{project}-dev layout checked out above.
          CYBERGO_SOURCE_ROOT: ${{ github.workspace }}/src
        run: npm run audit:api

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-drift-report
          path: report/api-drift.md

  # Go code-sample compile gate (roadmap #1). check-code-samples.ts extracts
  # every ```go block from docs/zh/, writes the complete ones (with a `package`
  # declaration) into a temp Go module — one subdir per block to avoid multiple
  # `package main` clashing — and runs `go build ./...` + `gofmt -l` against
  # the 6 cybergodev sources (replace'd to local checkouts). Compile errors fail
  # the job; gofmt issues are warnings only.
  #
  # Source checkout mirrors the audit-api job (6 cybergodev repos → src/{p}-dev)
  # so a missing/private repo fails the checkout step red rather than letting
  # check:code silently skip those samples.
  check-code-samples:
    name: Code samples (check:code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      # Shared setup: 6 cybergodev source checkouts (src/{project}-dev) + Go +
      # Node + npm ci. See .github/actions/setup-cybergo-src/action.yml.
      - uses: ./.github/actions/setup-cybergo-src

      - name: Check Go code samples
        env:
          # check-code-samples.ts joins CYBERGO_SOURCE_ROOT + `{project}-dev`,
          # matching the src/{project}-dev layout checked out above.
          CYBERGO_SOURCE_ROOT: ${{ github.workspace }}/src
        run: npm run check:code -- --all
