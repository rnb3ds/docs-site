name: CI

# Quality gate: type-check + production build on every PR and main push.
# Deploy (FTP) is handled separately by deploy.yml; this workflow only guards
# against regressions (type errors, broken builds, dead internal links —
# VitePress fails the build on the latter by default).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prettier is formatting-only and auto-fixable (npm run format); surface
      # it as a warning rather than blocking the merge.
      - name: Prettier format check
        continue-on-error: true
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

        # Project metadata dual-source sync (projects.yaml ↔ shared.ts).
        # Catches "added to yaml, forgot shared.ts" drift before merge.
      - name: Project metadata sync
        run: npm run check:projects

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=7168

      # Locale parity gate: every non-primary language's page set must match zh.
      # Catches missing/extra pages across the 5 language trees before merge.
      # Local: `npm run audit` → report/locale-parity.md.
      - name: Locale parity audit
        run: npm run audit

  # CJK typography gate (half/full-width punctuation, CJK–Latin spacing).
  # Chinese is the primary language, so this is near-zero-cost polish.
  # Local: `npm run lint:autocorrect` / `npm run fix:autocorrect`.
  lint:
    name: Autocorrect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # reviewdog's `github-pr-review` reporter needs PR-write to post comments.
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # reviewdog needs full git history to compute PR diff context
          # (which files/lines changed relative to the base branch).
          fetch-depth: 0

      # Step 1 — autocorrect lint gate, now NON-BLOCKING: CJK typography issues
      # (half/full-width punctuation, CJK–Latin spacing) no longer fail the job.
      # Local fix: `npm run fix:autocorrect`.
      - name: Autocorrect lint
        id: autocorrect
        continue-on-error: true
        uses: huacnlee/autocorrect-action@v2
        with:
          use_npm: true

      # Step 2 (PR only) — When lint found issues, re-run with reviewdog to post
      # the offending lines as inline PR review comments. Uses steps.autocorrect
      # .outcome (the real result, unaffected by continue-on-error above) instead
      # of failure(), because the lint step no longer propagates a job failure.
      # REVIEWDOG_GITHUB_API_TOKEN is MANDATORY — without it reviewdog aborts
      # and autocorrect panics writing to the closed pipe.
      - name: Report to PR via reviewdog
        if: steps.autocorrect.outcome == 'failure' && github.event_name == 'pull_request'
        uses: huacnlee/autocorrect-action@v2
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          use_npm: true
          reviewdog: true

  # Combined Go-source gate: API drift + code-sample compile. These previously
  # ran as two separate jobs, each duplicating the full 6-repo checkout + Go +
  # Node setup (.github/actions/setup-cybergo-src). Merged into one job to pay
  # that setup once. audit:api stays merge-blocking (DANGLING — docs citing
  # symbols the source no longer exports — fails the job via the trailing
  # "Fail on API drift" step), but runs non-interrupting so check:code still
  # reports on the same run. check:code compile errors block as before.
  #
  # Source checkout mirrors the old jobs (6 cybergodev repos → src/{p}-dev) so
  # a missing/private repo fails the checkout step red rather than letting the
  # scripts silently skip those entries.
  go-gates:
    name: API drift & code samples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      # Shared setup: 6 cybergodev source checkouts (src/{project}-dev) + Go +
      # Node + npm ci. See .github/actions/setup-cybergo-src/action.yml.
      - uses: ./.github/actions/setup-cybergo-src

      - name: API drift audit
        id: audit-api
        # Non-interrupting: keep going so check:code still runs on the same
        # job even when drift is found. The trailing "Fail on API drift" step
        # re-fails the job based on this outcome, preserving the merge gate.
        continue-on-error: true
        env:
          # audit-api.ts joins CYBERGO_SOURCE_ROOT + `{project}-dev`, matching
          # the src/{project}-dev layout checked out above.
          CYBERGO_SOURCE_ROOT: ${{ github.workspace }}/src
        run: npm run audit:api

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-drift-report
          path: report/api-drift.md

      - name: Check Go code samples
        env:
          # check-code-samples.ts joins CYBERGO_SOURCE_ROOT + `{project}-dev`,
          # matching the src/{project}-dev layout checked out above.
          CYBERGO_SOURCE_ROOT: ${{ github.workspace }}/src
        run: npm run check:code -- --all

      # Re-fail the job if audit:api found DANGLING drift. Its step ran with
      # continue-on-error so check:code could still report; this final step
      # restores the merge-blocking outcome based on the real step result.
      - name: Fail on API drift
        if: always() && steps.audit-api.outcome == 'failure'
        run: exit 1
